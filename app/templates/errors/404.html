{% extends "base.html" %}
{% block title %}404 — Page Not Found | ResumeAI{% endblock %}

{% block body %}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:2rem;">
    <div>
        <div style="font-size:8rem; font-weight:900; line-height:1;" class="text-gradient">404</div>
        <h2 style="font-weight:700; margin-bottom:1rem;">Page Not Found</h2>
        <p style="color:var(--text-secondary); max-width:400px; margin:0 auto 2rem;">
            The page you're looking for doesn't exist or has been moved.
        </p>
        <div class="d-flex justify-content-center gap-3">
            <a href="/" class="btn btn-primary-gradient px-4">
                <i class="bi bi-house me-2"></i>Go Home
            </a>
            <a href="javascript:history.back()" class="btn btn-outline-light px-4" style="border-color:var(--card-border); color:var(--text-secondary);">
                <i class="bi bi-arrow-left me-2"></i>Go Back
            </a>
        </div>
    </div>
</div>
{% endblock %}
