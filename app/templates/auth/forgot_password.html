{% extends "base.html" %}
{% block title %}Forgot Password — ResumeAI{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">{% endblock %}

{% block body %}
<div class="auth-wrapper">
    <div class="auth-card glass-card">
        <div class="text-center mb-4">
            <i class="bi bi-key text-gradient" style="font-size:2.5rem;"></i>
            <h2 style="font-weight:800; margin-top:0.5rem;">Reset Password</h2>
            <p style="color:var(--text-secondary); font-size:0.9rem;">Enter your email and we'll send a reset link</p>
        </div>
        {% include 'components/_flash_messages.html' %}
        <form method="POST" action="/auth/forgot-password">
            <div class="mb-4">
                <label class="form-label" style="color:var(--text-secondary); font-size:0.85rem; font-weight:500;">Email Address</label>
                <div class="input-group-custom">
                    <i class="bi bi-envelope input-icon"></i>
                    <input type="email" name="email" class="form-control input-custom" placeholder="you@company.com" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary-gradient w-100 py-2" style="font-weight:600;">
                <i class="bi bi-send me-2"></i>Send Reset Link
            </button>
        </form>
        <hr style="border-color:var(--card-border); margin:1.5rem 0;">
        <p class="text-center" style="color:var(--text-secondary); font-size:0.88rem; margin:0;">
            <a href="/auth/login" style="color:var(--primary); font-weight:600;"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
        </p>
    </div>
</div>
{% endblock %}
