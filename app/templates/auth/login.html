{% extends "base.html" %}
{% block title %}Login — ResumeAI{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">{% endblock %}

{% block body %}
<div class="auth-wrapper">
    <div class="auth-card glass-card">
        <!-- Brand -->
        <div class="text-center mb-4">
            <i class="bi bi-cpu text-gradient" style="font-size:2.5rem;"></i>
            <h2 style="font-weight:800; margin-top:0.5rem;">Welcome Back</h2>
            <p style="color:var(--text-secondary); font-size:0.9rem;">Sign in to your Resumeaccount</p>
        </div>

        {% include 'components/_flash_messages.html' %}

        <form method="POST" action="/auth/login" novalidate>
            <div class="mb-3">
                <label class="form-label" style="color:var(--text-secondary); font-size:0.85rem; font-weight:500;">Email Address</label>
                <div class="input-group-custom">
                    <i class="bi bi-envelope input-icon"></i>
                    <input type="email" name="email" id="email" class="form-control input-custom" placeholder="you@company.com" required value="">
                </div>
            </div>
            <div class="mb-3">
                <div class="d-flex justify-content-between">
                    <label class="form-label" style="color:var(--text-secondary); font-size:0.85rem; font-weight:500;">Password</label>
                    <a href="/auth/forgot-password" style="font-size:0.8rem; color:var(--primary);">Forgot password?</a>
                </div>
                <div class="input-group-custom">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" name="password" id="password" class="form-control input-custom" placeholder="••••••••" required>
                    <button type="button" class="btn-toggle-pw" onclick="togglePassword('password')" tabindex="-1">
                        <i class="bi bi-eye" id="pw-eye"></i>
                    </button>
                </div>
            </div>
            <div class="mb-4 d-flex align-items-center gap-2">
                <input class="form-check-input" type="checkbox" name="remember" id="remember" style="margin-top:0;">
                <label class="form-check-label" for="remember" style="color:var(--text-secondary); font-size:0.85rem;">Remember me for 30 days</label>
            </div>
            <button type="submit" class="btn btn-primary-gradient w-100 py-2" style="font-weight:600;">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>

        <hr style="border-color:var(--card-border); margin:1.5rem 0;">

        <p class="text-center" style="color:var(--text-secondary); font-size:0.88rem; margin:0;">
            Don't have an account? <a href="/auth/register" style="color:var(--primary); font-weight:600;">Create one free</a>
        </p>
    </div>
</div>

<script>
function togglePassword(fieldId) {
    var field = document.getElementById(fieldId);
    var icon = document.getElementById('pw-eye');
    if (field.type === 'password') {
        field.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        field.type = 'password';
        icon.className = 'bi bi-eye';
    }
}
</script>
{% endblock %}
