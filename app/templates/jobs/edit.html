{% extends "base.html" %}
{% block title %}Edit Job — ResumeAI{% endblock %}

{% block body %}
<div class="app-container" style="display:flex; padding-top:70px;">
    {% include 'components/_sidebar.html' %}
    <main class="main-content" style="flex:1; padding:2rem;">
        <div class="mb-4">
            <a href="/jobs/{{ job.id }}" style="color:var(--text-muted); text-decoration:none; font-size:0.85rem;"><i class="bi bi-arrow-left me-1"></i>Back to Job</a>
            <h1 style="font-size:1.5rem; font-weight:700; margin:0.5rem 0 0;">Edit Job</h1>
        </div>

        {% include 'components/_flash_messages.html' %}

        <form method="POST" action="/jobs/{{ job.id }}/edit">
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="glass-card p-4 mb-3">
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label" style="color:var(--text-secondary); font-size:0.85rem; font-weight:500;">Job Title</label>
                                <input type="text" name="title" class="form-control input-custom" value="{{ job.title }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" style="color:var(--text-secondary); font-size:0.85rem; font-weight:500;">Company</label>
                                <input type="text" name="company" class="form-control input-custom" value="{{ job.company or '' }}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" style="color:var(--text-secondary); font-size:0.85rem; font-weight:500;">Department</label>
                                <input type="text" name="department" class="form-control input-custom" value="{{ job.department or '' }}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" style="color:var(--text-secondary); font-size:0.85rem; font-weight:500;">Location</label>
                                <input type="text" name="location" class="form-control input-custom" value="{{ job.location or '' }}">
                            </div>
                            <div class="col-12">
                                <label class="form-label" style="color:var(--text-secondary); font-size:0.85rem; font-weight:500;">Description</label>
                                <textarea name="description" class="form-control input-custom" rows="6" required>{{ job.description }}</textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label" style="color:var(--text-secondary); font-size:0.85rem; font-weight:500;">Requirements</label>
                                <textarea name="requirements" class="form-control input-custom" rows="4">{{ job.requirements or '' }}</textarea>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="glass-card p-4">
                        <div class="mb-3">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="is_active" id="is_active" {% if job.is_active %}checked{% endif %}>
                                <label class="form-check-label" for="is_active" style="color:var(--text-secondary);">Job is Active</label>
                            </div>
                        </div>
                        <div class="d-flex flex-column gap-2">
                            <button type="submit" class="btn btn-primary-gradient py-2" style="font-weight:600;">Save Changes</button>
                            <form method="POST" action="/jobs/{{ job.id }}/delete" onsubmit="return confirm('Delete this job permanently?');">
                                <button type="submit" class="btn btn-outline-danger w-100"><i class="bi bi-trash me-1"></i>Delete Job</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </main>
</div>
{% endblock %}
