<!-- Flash Messages -->
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="alert-container">
    {% for category, message in messages %}
    <div class="alert alert-{{ category if category != 'message' else 'info' }} alert-dismissible alert-custom fade show mb-2" role="alert">
        {% if category == 'success' %}<i class="bi bi-check-circle me-2"></i>
        {% elif category == 'danger' %}<i class="bi bi-exclamation-triangle me-2"></i>
        {% elif category == 'warning' %}<i class="bi bi-exclamation-circle me-2"></i>
        {% else %}<i class="bi bi-info-circle me-2"></i>{% endif %}
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endfor %}
</div>
{% endif %}
{% endwith %}
